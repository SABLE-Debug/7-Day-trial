<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1920" />
<title>MOBIUS Audit — Loom Outro Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400&display=swap" rel="stylesheet" />
<style>
  :root {
    --void: #050404;
    --bone: #F2EDE4;
    --smoke: rgba(242,237,228,0.55);
    --mono: "Geist Mono", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1920px;
    height: 1080px;
    background: var(--void);
    color: var(--bone);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .stage {
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 56px;
    opacity: 0;
    animation: fadeIn 0.6s ease-out forwards;
  }
  .mark { width: 220px; height: 220px; }
  .caption {
    font-family: var(--mono);
    font-size: 18px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--smoke);
  }
  .pill {
    padding: 20px 40px;
    border: 1px solid var(--bone);
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 20px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--bone);
    opacity: 0;
    transform: scale(0.96);
    animation: pillIn 0.6s ease-out 1.0s forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes pillIn { to { opacity: 1; transform: scale(1); } }
  @media (max-width: 1920px) {
    body { width: 100vw; height: auto; min-height: 100vh; }
    .stage {
      width: 100vw;
      height: 56.25vw;
      max-height: 100vh;
    }
    .mark { width: 11.5vw; height: 11.5vw; max-width: 220px; max-height: 220px; }
    .caption { font-size: clamp(11px, 0.94vw, 18px); }
    .pill {
      font-size: clamp(12px, 1.04vw, 20px);
      padding: clamp(10px, 1vw, 20px) clamp(20px, 2.1vw, 40px);
    }
    .stage { gap: clamp(24px, 2.9vw, 56px); }
  }
</style>
</head>
<body>
<div class="stage">
  <img class="mark" src="../design/mobius-mark-light.png" alt="MOBIUS" />
  <div class="caption" id="caption">REPLY TO THIS THREAD</div>
  <div class="pill" id="domain">mobius.co</div>
</div>
<script>
  const params = new URLSearchParams(location.search);
  const cta = params.get("cta");
  const domain = params.get("domain");
  if (cta) document.getElementById("caption").textContent = cta.toUpperCase();
  if (domain) document.getElementById("domain").textContent = domain;
</script>
</body>
</html>
